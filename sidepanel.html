<!doctype html><html lang="hu"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>BlockFlow Sidebar</title><link rel="stylesheet" href="app.css"></head><body class="side-body">
  <div class="brand">BlockFlow</div>
  <div class="side-card">
    <div class="section-title" data-i18n="side.currentPage">Aktuális oldal</div>
    <div id="target" class="status" data-i18n="side.findingTarget">Cél tab keresése...</div>
    <div class="side-actions three" style="margin-top:8px">
      <button id="scan" data-i18n="side.scanPage">Oldal elemzése</button>
      <button id="pick" data-i18n="side.pickElement">Elem kiválasztása</button>
    </div>
  </div>
  <div class="side-card">
    <div class="section-title" data-i18n="side.automations">Automatizmusok</div>
    <select id="workflowSelect" style="width:100%;padding:9px;border-radius:12px;border:1px solid var(--line)"></select>
    <div class="side-actions three" style="margin-top:8px">
      <button id="dryRun">Dry-run</button>
      <button id="run" class="primary" data-i18n="button.run">Futtatás</button>
      <button id="forceRun" data-i18n="button.forceRunShort">Force</button>
      <button id="stop">Stop</button>
    </div>
    <button id="openBuilder" style="width:100%;margin-top:8px" data-i18n="popup.openBuilder">Builder megnyitása</button>
  </div>
  <div class="side-card">
    <div class="section-title" data-i18n="side.quickElement">Gyors elem</div>
    <div id="picked" class="status" data-i18n="side.noPickedElement">Nincs kiválasztott elem.</div>
  </div>
  <div class="side-card">
    <div class="section-title" data-i18n="side.log">Napló</div>
    <div id="log" class="status" data-i18n="status.ready">Kész.</div>
  </div>
<script src="common.js"></script><script src="sidepanel.js"></script>
</body></html>
