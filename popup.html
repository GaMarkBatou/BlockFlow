<!doctype html><html lang="hu"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>BlockFlow</title><link rel="stylesheet" href="app.css"><link rel="stylesheet" href="popup.css"></head><body class="popup-body">
  <div class="brand">BlockFlow</div>
  <div class="card">
    <button id="openSide" class="primary" style="width:100%">Sidebar megnyitása</button>
    <button id="openBuilder" style="width:100%;margin-top:8px">Builder megnyitása</button>
  </div>
  <div class="card">

  </div>

</body></html>
